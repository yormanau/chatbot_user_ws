<div class="card">
  <div class="card-header">
    <h1 class="title">ChatBot WhatsApp</h1>
    <p class="subtitle">Panel de administración</p>
  </div>

  <div class="status-row">
    <span class="status-dot" id="status-dot"></span>
    <span class="status-text" id="status-text">Verificando...</span>
  </div>

  <button class="btn-connect" id="btn-connect" disabled>
    Conectar WhatsApp
  </button>
</div>

<div class="modal-overlay" id="modal" hidden>
  <div class="modal">
    <div class="modal-header">
      <span>Escanea el código QR</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <img id="qr-img" src="" alt="QR Code"/>
      <div class="timer-row">
        <span class="timer-label">Expira en</span>
        <span class="timer" id="timer">60</span>
        <span class="timer-label">segundos</span>
    </div>
      <div class="timer-bar-track">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
    </div>
  </div>
</div>

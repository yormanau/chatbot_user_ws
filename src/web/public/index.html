<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/toast.css">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/register.css">
  <link rel="stylesheet" href="/css/datePicker.css">
  <link rel="stylesheet" href="/css/compras.css">
  <link rel="stylesheet" href="/css/analytics.css">
  <link rel="stylesheet" href="/css/ajustes.css">
  <link rel="stylesheet" href="/css/perfil.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="crm-layout">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <svg id="sidebar-brand-icon" width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="8" height="8" rx="2" fill="currentColor" opacity="0.9"/>
          <rect x="13" y="3" width="8" height="8" rx="2" fill="currentColor" opacity="0.6"/>
          <rect x="3" y="13" width="8" height="8" rx="2" fill="currentColor" opacity="0.6"/>
          <rect x="13" y="13" width="8" height="8" rx="2" fill="currentColor" opacity="0.35"/>
        </svg>
        <span>CRM</span>
      </div>

      <nav class="sidebar-nav">
        <button class="sidebar-nav__item active" data-section="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
          </svg>
          Dashboard
        </button>
        <button class="sidebar-nav__item" data-section="contacts">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M2 21v-2a6 6 0 0 1 6-6h2a6 6 0 0 1 6 6v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M19 8v6M16 11h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Contactos
        </button>
        <button class="sidebar-nav__item" data-section="purchases">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 10a4 4 0 0 1-8 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Ventas
        </button>
        <button class="sidebar-nav__item" data-section="products">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Productos
        </button>
        <hr class="sidebar-divider">
        <button class="sidebar-nav__item" data-section="settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="2"/>
          </svg>
          Ajustes
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="sidebar-logout" id="btn-logout">
          <img src="/assets/icons/logout.svg" alt="Salir" width="16" height="16">
          Cerrar sesión
        </button>
      </div>
    </aside>

    <div class="crm-body">
      <header class="topbar" id="topbar-container"></header>

      <main class="main-content">
        <div id="section-dashboard" class="crm-section"></div>
        <div id="section-contacts"  class="crm-section" hidden></div>
        <div id="section-purchases" class="crm-section" hidden></div>
        <div id="section-products"  class="crm-section" hidden></div>
        <div id="section-settings"  class="crm-section" hidden></div>
      </main>
    </div>

  </div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>

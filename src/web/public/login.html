<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-logo">
        <div class="login-logo__icon">💬</div>
        <div class="login-logo__text">
          <span class="login-logo__name">ChatBot WhatsApp</span>
          <span class="login-logo__sub">Panel de control</span>
        </div>
      </div>

      <h1 class="login-title">Bienvenido</h1>
      <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

      <div class="field">
        <label class="field__label" for="input-user">Usuario</label>
        <input class="field__input" id="input-user" type="text" placeholder="usuario" autocomplete="username">
      </div>

      <div class="field">
        <label class="field__label" for="input-pin">PIN</label>
        <input class="field__input" id="input-pin" type="password" placeholder="••••" autocomplete="current-password" maxlength="64">
      </div>

      <div class="error-msg" id="error-msg">Usuario o PIN incorrecto</div>

      <button class="btn-login" id="btn-login">
        <span class="btn-text">Ingresar</span>
        <div class="spinner"></div>
      </button>

    </div>
  </div>

  <script src="/js/login.js"></script>
  <script type="module">
    import { applySettings } from '/js/themeSettings.js';
    applySettings();
  </script>
</body>
</html>
